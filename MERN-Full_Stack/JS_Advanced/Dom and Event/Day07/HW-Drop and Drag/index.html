<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="text-align: center;">Task Manager</h1>

    <div id="ip-parent">
        <input id="ip" type="text">
        <button id="btn">Add Task</button>
    </div>

    <div id="parent">
        <section class="boxes">
            <h1 style="text-align: center;">Pending</h1>

            <div id="pending" class="abc">

            </div>
        </section>

        <section class="boxes">
            <h1 style="text-align: center;">In Progress</h1>

            <div class="abc" id="progress">

            </div>
        </section>

        <section class="boxes">
            <h1 style="text-align: center;">Comleted</h1>

            <div class="abc" id="comleted"></div>
        </section>
    </div>

    

    <script src="./app.js"></script>    
</body>
</html>
