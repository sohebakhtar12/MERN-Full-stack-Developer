<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
</head>
<body>
    <h1>CSS Position </h1>

    <div class="parent">
        <div class="children">A</div>
        <div id="static-special" class="children">B</div>
        <div class="children">C</div>
    </div>

    <div class="parent">
        <div class="children">A</div>
        <div id="relative-special" class="children">B</div>
        <div class="children">C</div>
    </div>

     <div style="position: relative;" class="parent">
        <div  class="children">A</div>
        <div  id="absolute-special" class="children">B</div>
        <div  class="children">C</div>
    </div>


</body>
</html>
